# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - replay-david-web

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: replaydavid.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_023E0E32112C4D42BDBC4E4705A96552 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_82EDD7815E884D088E2AB278BD9C7D16 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: replaydavid.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_023E0E32112C4D42BDBC4E4705A96552 }}/nextjs-app:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_ED13A5DCCEA04E499963B7CC65D722E5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E1194239D1CC4089B55A863CF874ADBB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_00F1078A57174C85B2D7000D7657B51C }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'replay-david-web'
          slot-name: 'Production'
          images: 'replaydavid.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_023E0E32112C4D42BDBC4E4705A96552 }}/nextjs-app:${{ github.sha }}'
          